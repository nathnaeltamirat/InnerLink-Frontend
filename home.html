<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Negeyachin home  page</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Negeyachin</h1>
            <button id="logoutBtn">Logout</button>
        </div>
        
        <div id="userInfo" class="user-info">
            <div class="avatar"></div>
            <div>
                <h2 id="userName">Loading...</h2>
                <p id="userRole">Loading...</p>
            </div>
        </div>
        
        <div class="status-box">
            <h3>Connected to Backend</h3>
            <p>backend is running and database is connected!</p>
        </div>
        
        <div class="features">
            <div class="feature">
                <p>User: <span id="userAlias">-</span></p>
            </div>
            <div class="feature">  
                <p>Email: <span id="userEmail">-</span></p>
            </div>
            <div class="feature">
                <p>Role: <span id="userRoleDisplay">-</span></p>
            </div>
        </div>
        
        <div class="api-test">
            <h3>Test API Calls</h3>
            <button id="testReflections">Load Reflections</button>
            <div id="reflectionsResult"></div>
        </div>
    </div>
    
<!--    <script src="js/api.js"></script>-->
<!--    <script src="js/main.js"></script>-->
</body>
</html>
