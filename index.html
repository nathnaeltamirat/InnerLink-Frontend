<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Negeyachin Login page</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <div class="login-box">
            <h1>Negeyachin</h1>
            <p class="tagline">Take your time. Someone is here.</p>
            
            <form id="loginForm">
                <div class="form-group">
                    <input type="email" id="email" placeholder="Email" required>
                </div>
                <div class="form-group">
                    <input type="password" id="passkey" placeholder="Passkey" required>
                </div>
                <button type="submit">Enter Quietly →</button>
            </form>
            
            <div id="message" class="message"></div>
            
            <p class="register-link">
                <a href="#" id="showRegister">Create a space</a>
            </p>
        </div>
        
        <div id="registerForm" style="display:none;" class="login-box">
            <h2>Create Your Sanctuary</h2>
            <form id="registerFormElement">
                <div class="form-group">
                    <input type="email" id="regEmail" placeholder="Email" required>
                </div>
                <div class="form-group">
                    <input type="password" id="regPasskey" placeholder="Passkey" required>
                </div>
                <div class="form-group">
                    <input type="text" id="regAlias" placeholder="Alias (optional)">
                </div>
                <button type="submit">Create Space</button>
            </form>
            <p class="register-link">
                <a href="#" id="showLogin">Back to login</a>
            </p>
        </div>
    </div>
    
    <script src="js/api.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
