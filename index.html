<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Negeyachin — Digital Sanctuary</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/index.css
  ">
</head>
<body>

<!--  Left panel -->
<section class="left" aria-label="Brand panel">
  <div class="circles" aria-hidden="true">
    <div class="circle c1"></div>
    <div class="circle c2"></div>
    <div class="circle c3"></div>
  </div>

  <div class="brand">Negeyachin</div>

  <div class="hero">
    <h1 class="hero-headline">Take your time.<br>Someone is here.</h1>
    <p class="hero-sub">Step away from the noise and enter a space designed for reflection, quietude, and digital presence.</p>
    <div class="hero-tag">Digital Sanctuary</div>
  </div>

  <div></div><!-- spacer -->
</section>

<!-- ── Right panel (form)-->
<section class="right" aria-label="Authentication">

  <div id="msg" class="msg" role="alert"></div>

  <!-- Mode tabs -->
  <div class="mode-tabs" role="tablist">
    <button class="mode-tab active" id="tab-signin" role="tab" aria-selected="true" onclick="switchMode('signin')">Sign In</button>
    <button class="mode-tab"        id="tab-signup" role="tab" aria-selected="false" onclick="switchMode('signup')">Create Space</button>
  </div>

  <!-- Dynamic title -->
  <h2 class="form-title" id="form-title">Welcome Back</h2>
  <p class="form-sub"   id="form-subtitle">Continue your journey in private.</p>

  <!-- Form -->
  <form id="auth-form" novalidate>
    <!-- Alias (signup only) -->
    <div class="form-group" id="alias-group">
      <label class="lbl" for="alias">Display Name <span style="color:var(--text-muted)">(optional)</span></label>
      <input class="field" type="text" id="alias" name="alias" placeholder="Your anonymous alias" autocomplete="off" />
    </div>

    <!-- Email -->
    <div class="form-group">
      <label class="lbl" for="email">Email Address</label>
      <input class="field" type="email" id="email" name="email" placeholder="Your email address" autocomplete="email" required />
    </div>

    <!-- Passkey -->
    <div class="form-group">
      <label class="lbl" for="passkey">Passkey</label>
      <input class="field" type="password" id="passkey" name="passkey" placeholder="Your private password" autocomplete="current-password" required />
    </div>



    <!-- Submit -->
    <button type="submit" class="btn-submit" id="submit-btn">
      <span class="label-wrap">
        <span id="btn-label">Enter Quietly</span>
        <span class="arrow">→</span>
      </span>
      <span class="spinner-wrap"><div class="spin"></div></span>
    </button>

    <!-- Footer -->
    <p class="form-footer" id="form-footer">
      New here? <a onclick="switchMode('signup')">Create a space</a>
    </p>
  </form>
</section>


<script src = 'js/index.js'>
 
</script>
</body>
</html>
