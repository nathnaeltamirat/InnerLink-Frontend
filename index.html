<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Negeyachin — Digital Sanctuary</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #0d0e10;
      --bg-panel:    #13151a;
      --bg-input:    #1a1c23;
      --bg-input-f:  #1f2229;
      --border:      rgba(255,255,255,0.07);
      --border-f:    rgba(82,148,255,0.45);
      --text:        #e2e4ea;
      --text-sub:    #8a8f9e;
      --text-muted:  #4e5363;
      --accent:      #d4edba;
      --accent-text: #1a2e0f;
      --blue:        #5294ff;
      --font-serif:  'DM Serif Display', Georgia, serif;
      --font-sans:   'DM Sans', system-ui, sans-serif;
      --ease:        cubic-bezier(0.4,0,0.2,1);
    }

    html, body { height: 100%; }

    body {
      font-family: var(--font-sans);
      background: var(--bg);
      color: var(--text);
      display: flex;
      align-items: stretch;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Layout split ───────────────────────────────────── */
    .left {
      flex: 1;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 36px 48px;
      background: var(--bg-panel);
    }

    .right {
      width: 460px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 56px 52px;
      background: var(--bg);
      border-left: 1px solid var(--border);
    }

    /* ── Decorative circles ─────────────────────────────── */
    .circles {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }
    .circle {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,0.025);
      border: 1px solid rgba(255,255,255,0.04);
    }
    .c1 { width: 480px; height: 480px; bottom: -80px; left: 40px; }
    .c2 { width: 280px; height: 280px; bottom: 80px;  left: 200px; background: rgba(255,255,255,0.015); }
    .c3 { width: 180px; height: 180px; top: 80px;     right: -40px; background: rgba(82,148,255,0.04); border-color: rgba(82,148,255,0.07); }

    /* ── Logo / brand ───────────────────────────────────── */
    .brand {
      font-size: 15px;
      font-weight: 500;
      letter-spacing: 0.2px;
      color: var(--text);
      position: relative;
      z-index: 1;
    }

    /* ── Left hero content ──────────────────────────────── */
    .hero {
      position: relative;
      z-index: 1;
    }
    .hero-headline {
      font-family: var(--font-serif);
      font-size: clamp(38px, 4.5vw, 54px);
      line-height: 1.12;
      color: var(--text);
      margin-bottom: 20px;
      animation: fadeUp 0.7s var(--ease) both;
    }
    .hero-sub {
      font-size: 14px;
      color: var(--text-sub);
      line-height: 1.7;
      max-width: 300px;
      animation: fadeUp 0.7s 0.1s var(--ease) both;
    }
    .hero-tag {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 10.5px;
      letter-spacing: 1.8px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-top: 40px;
      animation: fadeUp 0.7s 0.2s var(--ease) both;
    }
    .hero-tag::before {
      content: '';
      display: block;
      width: 32px;
      height: 1px;
      background: var(--text-muted);
    }

    /* ── Right form ─────────────────────────────────────── */
    .form-title {
      font-size: 24px;
      font-weight: 400;
      margin-bottom: 6px;
      animation: fadeUp 0.6s var(--ease) both;
    }
    .form-sub {
      font-size: 13.5px;
      color: var(--text-sub);
      margin-bottom: 36px;
      animation: fadeUp 0.6s 0.08s var(--ease) both;
    }

    .form-group {
      margin-bottom: 18px;
      animation: fadeUp 0.6s 0.12s var(--ease) both;
    }
    .form-group + .form-group { animation-delay: 0.16s; }

    label.lbl {
      display: block;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.5px;
      color: var(--text-sub);
      margin-bottom: 8px;
    }

    input.field {
      width: 100%;
      padding: 13px 16px;
      background: var(--bg-input);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 10px;
      font-family: var(--font-sans);
      font-size: 14px;
      outline: none;
      transition: border-color 0.18s, background 0.18s;
    }
    input.field::placeholder { color: var(--text-muted); }
    input.field:focus {
      border-color: var(--border-f);
      background: var(--bg-input-f);
    }

    .row-forgot {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 22px;
      animation: fadeUp 0.6s 0.2s var(--ease) both;
    }
    .link-forgot {
      font-size: 12px;
      color: var(--text-sub);
      cursor: pointer;
      transition: color 0.15s;
    }
    .link-forgot:hover { color: var(--text); }

    .btn-submit {
      width: 100%;
      padding: 15px 24px;
      background: var(--accent);
      color: var(--accent-text);
      border: none;
      border-radius: 999px;
      font-family: var(--font-sans);
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: background 0.18s, transform 0.15s;
      animation: fadeUp 0.6s 0.24s var(--ease) both;
      margin-bottom: 28px;
    }
    .btn-submit:hover { background: #c2e5a6; transform: translateY(-1px); }
    .btn-submit:active { transform: translateY(0); }
    .btn-submit .arrow { font-size: 17px; }
    .btn-submit .spinner-wrap { display: none; }
    .btn-submit.loading .label-wrap { display: none; }
    .btn-submit.loading .spinner-wrap { display: flex; }

    .divider-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
      animation: fadeUp 0.6s 0.26s var(--ease) both;
    }
    .divider-line { flex: 1; height: 1px; background: var(--border); }
    .divider-text { font-size: 12px; color: var(--text-muted); }

    .form-footer {
      text-align: center;
      font-size: 13px;
      color: var(--text-sub);
      animation: fadeUp 0.6s 0.28s var(--ease) both;
    }
    .form-footer a {
      color: var(--text);
      font-weight: 500;
      cursor: pointer;
      border-bottom: 1px solid rgba(255,255,255,0.2);
      padding-bottom: 1px;
      transition: border-color 0.15s;
    }
    .form-footer a:hover { border-color: var(--text); }

    /* ── Error / success messages ───────────────────────── */
    .msg {
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 18px;
      display: none;
    }
    .msg.show { display: block; }
    .msg.error   { background: rgba(224,92,92,0.1);  color: #e07070; border: 1px solid rgba(224,92,92,0.2); }
    .msg.success { background: rgba(77,186,127,0.1); color: #6dd49b; border: 1px solid rgba(77,186,127,0.2); }

    /* ── Spinner ────────────────────────────────────────── */
    .spin {
      width: 18px; height: 18px; border-radius: 50%;
      border: 2px solid rgba(26,46,15,0.2);
      border-top-color: var(--accent-text);
      animation: rotate 0.65s linear infinite;
    }
    @keyframes rotate { to { transform: rotate(360deg); } }

    /* ── Signup extras ──────────────────────────────────── */
    #alias-group { display: none; }
    #alias-group.show { display: block; }

    /* ── Animations ─────────────────────────────────────── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Mode toggle (signin / signup) ──────────────────── */
    .mode-tabs {
      display: flex;
      gap: 0;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 3px;
      margin-bottom: 32px;
      animation: fadeUp 0.6s 0.04s var(--ease) both;
    }
    .mode-tab {
      flex: 1;
      padding: 8px 0;
      font-size: 13px;
      font-weight: 400;
      color: var(--text-muted);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.18s;
      text-align: center;
      border: none;
      background: transparent;
      font-family: var(--font-sans);
    }
    .mode-tab.active {
      background: var(--bg-panel);
      color: var(--text);
      font-weight: 500;
      border: 1px solid var(--border);
    }

    /* ── Responsive ─────────────────────────────────────── */
    @media (max-width: 820px) {
      body { flex-direction: column; }
      .left { flex: none; min-height: 200px; padding: 28px 28px 24px; }
      .right { width: 100%; padding: 36px 28px; border-left: none; border-top: 1px solid var(--border); }
      .hero-headline { font-size: 32px; }
      .c1, .c2, .c3 { display: none; }
    }
  </style>
</head>
<body>

<!-- ── Left panel ───────────────────────────────────────── -->
<section class="left" aria-label="Brand panel">
  <div class="circles" aria-hidden="true">
    <div class="circle c1"></div>
    <div class="circle c2"></div>
    <div class="circle c3"></div>
  </div>

  <div class="brand">Negeyachin</div>

  <div class="hero">
    <h1 class="hero-headline">Take your time.<br>Someone is here.</h1>
    <p class="hero-sub">Step away from the noise and enter a space designed for reflection, quietude, and digital presence.</p>
    <div class="hero-tag">Digital Sanctuary</div>
  </div>

  <div></div><!-- spacer -->
</section>

<!-- ── Right panel (form) ────────────────────────────────── -->
<section class="right" aria-label="Authentication">

  <div id="msg" class="msg" role="alert"></div>

  <!-- Mode tabs -->
  <div class="mode-tabs" role="tablist">
    <button class="mode-tab active" id="tab-signin" role="tab" aria-selected="true" onclick="switchMode('signin')">Sign In</button>
    <button class="mode-tab"        id="tab-signup" role="tab" aria-selected="false" onclick="switchMode('signup')">Create Space</button>
  </div>

  <!-- Dynamic title -->
  <h2 class="form-title" id="form-title">Welcome Back</h2>
  <p class="form-sub"   id="form-subtitle">Continue your journey in private.</p>

  <!-- Form -->
  <form id="auth-form" novalidate>
    <!-- Alias (signup only) -->
    <div class="form-group" id="alias-group">
      <label class="lbl" for="alias">Display Name <span style="color:var(--text-muted)">(optional)</span></label>
      <input class="field" type="text" id="alias" name="alias" placeholder="Your anonymous alias" autocomplete="off" />
    </div>

    <!-- Email -->
    <div class="form-group">
      <label class="lbl" for="email">Email Address</label>
      <input class="field" type="email" id="email" name="email" placeholder="Your email address" autocomplete="email" required />
    </div>

    <!-- Passkey -->
    <div class="form-group">
      <label class="lbl" for="passkey">Passkey</label>
      <input class="field" type="password" id="passkey" name="passkey" placeholder="Your private password" autocomplete="current-password" required />
    </div>

    <!-- Forgot (signin only) -->
    <div class="row-forgot" id="forgot-row">
      <span class="link-forgot" tabindex="0">Forgot passkey?</span>
    </div>

    <!-- Submit -->
    <button type="submit" class="btn-submit" id="submit-btn">
      <span class="label-wrap">
        <span id="btn-label">Enter Quietly</span>
        <span class="arrow">→</span>
      </span>
      <span class="spinner-wrap"><div class="spin"></div></span>
    </button>

    <!-- Footer -->
    <p class="form-footer" id="form-footer">
      New here? <a onclick="switchMode('signup')">Create a space</a>
    </p>
  </form>
</section>

<script>
  const API_BASE = 'http://localhost:8080/api';
  let currentMode = 'signin';

  // ── Mode switching ──────────────────────────────────────
  function switchMode(mode) {
    currentMode = mode;
    const isSignup = mode === 'signup';

    document.getElementById('tab-signin').classList.toggle('active', !isSignup);
    document.getElementById('tab-signup').classList.toggle('active',  isSignup);
    document.getElementById('tab-signin').setAttribute('aria-selected', !isSignup);
    document.getElementById('tab-signup').setAttribute('aria-selected',  isSignup);

    document.getElementById('alias-group').classList.toggle('show', isSignup);
    document.getElementById('forgot-row').style.display = isSignup ? 'none' : 'flex';

    document.getElementById('form-title').textContent    = isSignup ? 'Create a Space' : 'Welcome Back';
    document.getElementById('form-subtitle').textContent = isSignup ? 'A quiet corner, just for you.' : 'Continue your journey in private.';
    document.getElementById('btn-label').textContent     = isSignup ? 'Create Space' : 'Enter Quietly';
    document.getElementById('form-footer').innerHTML     = isSignup
      ? 'Already here? <a onclick="switchMode(\'signin\')">Sign in</a>'
      : 'New here? <a onclick="switchMode(\'signup\')">Create a space</a>';

    hideMsg();
    document.getElementById('auth-form').reset();
  }

  // ── Message helpers ─────────────────────────────────────
  function showMsg(text, type) {
    const el = document.getElementById('msg');
    el.textContent = text;
    el.className   = 'msg show ' + type;
  }
  function hideMsg() {
    document.getElementById('msg').className = 'msg';
  }

  // ── Loading state ───────────────────────────────────────
  function setLoading(state) {
    document.getElementById('submit-btn').classList.toggle('loading', state);
    document.getElementById('submit-btn').disabled = state;
  }

  // ── Form submit ─────────────────────────────────────────
  document.getElementById('auth-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    hideMsg();

    const email   = document.getElementById('email').value.trim();
    const passkey = document.getElementById('passkey').value.trim();
    const alias   = document.getElementById('alias').value.trim();

    if (!email || !passkey) {
      showMsg('Please fill in all required fields.', 'error');
      return;
    }

    setLoading(true);

    try {
      const endpoint = currentMode === 'signup' ? '/auth/signup' : '/auth/signin';
      const body = currentMode === 'signup'
        ? { email, passkey, alias: alias || undefined }
        : { email, passkey };

      const res  = await fetch(API_BASE + endpoint, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      const json = await res.json();

      if (!res.ok || !json.success) {
        showMsg(json.message || 'Something went wrong. Please try again.', 'error');
        return;
      }

      // Store session
      const { token, userId, role, alias: userAlias, email: userEmail } = json.data;
      localStorage.setItem('ng_token',  token);
      localStorage.setItem('ng_userId', userId);
      localStorage.setItem('ng_role',   role);
      localStorage.setItem('ng_alias',  userAlias || email.split('@')[0]);
      localStorage.setItem('ng_email',  userEmail);

      showMsg(
        currentMode === 'signup'
          ? 'Space created. Entering quietly…'
          : 'Welcome back. Entering quietly…',
        'success'
      );

      // Redirect based on role
      setTimeout(() => {
        if (role === 'admin') {
          window.location.href = 'dashboard.html';
        } else {
          window.location.href = 'home.html';
        }
      }, 900);

    } catch (err) {
      showMsg('Could not connect to server. Please check your connection.', 'error');
      console.error(err);
    } finally {
      setLoading(false);
    }
  });

  // ── If already logged in, redirect ─────────────────────
  (function() {
    const token = localStorage.getItem('ng_token');
    const role  = localStorage.getItem('ng_role');
    if (token) {
      window.location.href = role === 'admin' ? 'dashboard.html' : 'home.html';
    }
  })();
</script>
</body>
</html>
